<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset do CRM — Bentes Ramos</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a365d;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        text-align: center;
      }
      .card {
        max-width: 480px;
        background: rgba(255, 255, 255, 0.08);
        padding: 32px;
        border-radius: 12px;
        backdrop-filter: blur(10px);
      }
      h1 { margin-top: 0; font-size: 22px; }
      p { line-height: 1.6; opacity: 0.9; }
      .status {
        margin: 20px 0;
        padding: 12px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        font-family: monospace;
        font-size: 13px;
        text-align: left;
        white-space: pre-wrap;
      }
      button {
        background: #fff;
        color: #1a365d;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 8px;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🔧 Reset do CRM</h1>
      <p>Esta página limpa o cache do navegador e o Service Worker antigo que pode estar travando o sistema.</p>
      <div class="status" id="status">Aguardando...</div>
      <button onclick="goToApp()">Abrir CRM</button>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      function log(msg) {
        statusEl.textContent += "\n" + msg;
      }

      async function reset() {
        statusEl.textContent = "Iniciando limpeza...";
        try {
          if ("serviceWorker" in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            log("Service Workers encontrados: " + regs.length);
            for (const r of regs) {
              await r.unregister();
              log("✓ SW removido: " + (r.scope || "(sem escopo)"));
            }
          }
          if (window.caches) {
            const keys = await caches.keys();
            log("Caches encontrados: " + keys.length);
            for (const k of keys) {
              await caches.delete(k);
              log("✓ Cache removido: " + k);
            }
          }
          try {
            sessionStorage.clear();
            log("✓ sessionStorage limpo");
          } catch (e) {}
          log("\n✅ Limpeza concluída! Redirecionando em 2s...");
          setTimeout(goToApp, 2000);
        } catch (e) {
          log("❌ Erro: " + e.message);
        }
      }

      function goToApp() {
        window.location.href = "/?clean=" + Date.now();
      }

      reset();
    </script>
  </body>
</html>
