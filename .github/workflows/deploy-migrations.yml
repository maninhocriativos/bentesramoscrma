name: Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply new migrations via Supabase API
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="qgenaltkjtlvwfgykpxq"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"
          FAILED=0

          # Só processa migrations a partir de 2026-05-23 (data de adoção deste workflow)
          # As anteriores já estavam no banco quando o projeto foi criado
          CUTOFF="20260523"

          for sql_file in $(ls supabase/migrations/*.sql | sort); do
            filename=$(basename "$sql_file")
            prefix="${filename:0:8}"

            if [[ "$prefix" < "$CUTOFF" ]]; then
              continue
            fi

            echo "▶ Aplicando: $filename"

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(cat "$sql_file" | jq -Rs .)}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "  ✅ OK"
            else
              echo "  ❌ Erro ($HTTP_CODE): $BODY"
              FAILED=1
            fi
          done

          exit $FAILED
