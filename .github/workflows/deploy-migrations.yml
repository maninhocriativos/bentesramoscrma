name: Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply new migrations via Supabase API
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="qgenaltkjtlvwfgykpxq"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          run_sql() {
            curl -s -o /dev/null -w "%{http_code}" -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$1" | jq -Rs .)}"
          }

          # Cria tabela de controle
          run_sql "CREATE TABLE IF NOT EXISTS _migration_history (
            filename TEXT PRIMARY KEY,
            applied_at TIMESTAMPTZ DEFAULT NOW()
          );"

          # Marca todas as migrations anteriores a 2026-05-23 como já aplicadas
          # (foram aplicadas quando o projeto foi criado no Lovable/Supabase)
          for sql_file in $(ls supabase/migrations/*.sql | sort); do
            filename=$(basename "$sql_file")
            # Migrations antes de hoje já estavam no banco — registra sem rodar
            if [[ "$filename" < "20260523" ]]; then
              run_sql "INSERT INTO _migration_history (filename) VALUES ($(echo "$filename" | jq -Rs .)) ON CONFLICT DO NOTHING;" > /dev/null
            fi
          done

          FAILED=0

          for sql_file in $(ls supabase/migrations/*.sql | sort); do
            filename=$(basename "$sql_file")

            # Pula se já registrada
            RESULT=$(curl -s -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"SELECT filename FROM _migration_history WHERE filename = $(echo "$filename" | jq -Rs .) LIMIT 1\"}")

            if echo "$RESULT" | grep -q "\"$filename\""; then
              echo "⏭  Já aplicada: $filename"
              continue
            fi

            echo "▶ Aplicando: $filename"
            SQL=$(cat "$sql_file")

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              run_sql "INSERT INTO _migration_history (filename) VALUES ($(echo "$filename" | jq -Rs .)) ON CONFLICT DO NOTHING;" > /dev/null
              echo "✅ Aplicada: $filename"
            else
              echo "❌ Falhou ($HTTP_CODE): $BODY"
              FAILED=1
              break
            fi
          done

          exit $FAILED
