name: Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations via Supabase API
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="qgenaltkjtlvwfgykpxq"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"
          FAILED=0

          for sql_file in $(ls supabase/migrations/*.sql | sort); do
            filename=$(basename "$sql_file")
            echo "▶ $filename"

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(cat "$sql_file" | jq -Rs .)}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "  ✅ OK"
            elif echo "$BODY" | grep -qE '"42710"|"42P07"|"42701"|"23505"|already exists|duplicate key'; then
              echo "  ⏭  Já aplicada (ignorado)"
            else
              echo "  ❌ Erro ($HTTP_CODE): $BODY"
              FAILED=1
              break
            fi
          done

          exit $FAILED
