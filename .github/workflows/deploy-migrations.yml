name: Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply new migrations via Supabase API
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="qgenaltkjtlvwfgykpxq"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          run_sql() {
            local sql="$1"
            curl -s -o /dev/null -w "%{http_code}" -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$sql" | jq -Rs .)}"
          }

          # Cria tabela de controle se não existir
          run_sql "CREATE TABLE IF NOT EXISTS _migration_history (
            filename TEXT PRIMARY KEY,
            applied_at TIMESTAMPTZ DEFAULT NOW()
          );"

          FAILED=0

          for sql_file in $(ls supabase/migrations/*.sql | sort); do
            filename=$(basename "$sql_file")

            # Verifica se já foi aplicada
            RESULT=$(curl -s -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"SELECT 1 FROM _migration_history WHERE filename = $(echo "$filename" | jq -Rs .) LIMIT 1\"}")

            COUNT=$(echo "$RESULT" | jq -r '.[0] | length // 0' 2>/dev/null || echo "0")

            if [ "$COUNT" != "0" ] && [ "$COUNT" != "null" ] && echo "$RESULT" | grep -q '"1"'; then
              echo "⏭ Já aplicada: $filename"
              continue
            fi

            echo "▶ Aplicando: $filename"
            SQL=$(cat "$sql_file")

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$API" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              # Registra como aplicada
              run_sql "INSERT INTO _migration_history (filename) VALUES ($(echo "$filename" | jq -Rs .)) ON CONFLICT DO NOTHING;"
              echo "✅ Sucesso: $filename"
            else
              echo "❌ Falhou ($HTTP_CODE): $BODY"
              FAILED=1
              break
            fi
          done

          exit $FAILED
