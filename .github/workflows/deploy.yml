name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy analyze-extrato
        run: supabase functions deploy analyze-extrato --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy isa-meta-first-contact
        run: supabase functions deploy isa-meta-first-contact --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy ai-chat
        run: supabase functions deploy ai-chat --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy isa-auto-process
        run: supabase functions deploy isa-auto-process --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy isa-reply-manychat
        run: supabase functions deploy isa-reply-manychat --project-ref qgenaltkjtlvwfgykpxq
