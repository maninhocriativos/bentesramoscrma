name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy all Edge Functions
        run: |
          for dir in supabase/functions/*/; do
            func=$(basename "$dir")
            # Skip shared helpers — not deployable functions
            if [[ "$func" == "_shared" ]]; then continue; fi
            echo "▶ Deploying $func..."
            supabase functions deploy "$func" --project-ref qgenaltkjtlvwfgykpxq
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
