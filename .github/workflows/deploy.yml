name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy analyze-extrato
        run: supabase functions deploy analyze-extrato --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy isa-meta-first-contact
        run: supabase functions deploy isa-meta-first-contact --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy ai-chat
        run: supabase functions deploy ai-chat --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy isa-auto-process
        run: supabase functions deploy isa-auto-process --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-meta-event
        run: supabase functions deploy send-meta-event --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy traffic-followup-automation
        run: supabase functions deploy traffic-followup-automation --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy isa-lembrete-sender
        run: supabase functions deploy isa-lembrete-sender --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy isa-scheduler
        run: supabase functions deploy isa-scheduler --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy isa-check-appointments
        run: supabase functions deploy isa-check-appointments --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy processo-status-monitor
        run: supabase functions deploy processo-status-monitor --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy processo-status-notify
        run: supabase functions deploy processo-status-notify --project-ref qgenaltkjtlvwfgykpxq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
