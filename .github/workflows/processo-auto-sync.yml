name: Sync Automático de Processos

on:
  schedule:
    # A cada 15 min, o dia todo. Antes rodava 1x/dia com MAX=6 — a 864
    # processos "Em Andamento" com refresh devido a cada 72h, isso nunca dava
    # conta (821 de 864 ficaram atrasados). Com MAX=6 a cada 15min = ate 576/dia,
    # cobre o backlog em ~1-2 dias e depois sustenta o ciclo de 72h tranquilo.
    - cron: '*/15 * * * *'
  # Permite acionar manualmente pelo GitHub Actions UI
  workflow_dispatch:
    inputs:
      max:
        # 15 estourava o idle timeout (150s) da edge function na maioria das
        # execuções (~70% de falha) — 6 fica com folga confortável.
        description: 'Máximo de processos por execução'
        required: false
        default: '6'
      force_all:
        description: 'Forçar atualização de todos (true/false)'
        required: false
        default: 'false'

jobs:
  sync:
    name: Sincronizar Processos Jurídicos
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Disparar processo-auto-sync
        run: |
          MAX="${{ github.event.inputs.max || '6' }}"
          FORCE="${{ github.event.inputs.force_all || 'false' }}"

          echo "Disparando sync: max=$MAX, force_all=$FORCE"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 600 \
            -X POST \
            "https://qgenaltkjtlvwfgykpxq.supabase.co/functions/v1/processo-auto-sync" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnZW5hbHRranRsdndmZ3lrcHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5NjYxOTMsImV4cCI6MjA4MDU0MjE5M30.ewhDXc8qxAXdAevO-LMU_HOzu7oGUbj-p6Tj39hyUgg" \
            -d "{\"max\": $MAX, \"force_all\": $FORCE}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERRO: resposta HTTP $HTTP_CODE"
            exit 1
          fi

          SYNCED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('synced',0))" 2>/dev/null || echo "?")
          SKIPPED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('skipped',0))" 2>/dev/null || echo "?")
          FAILED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed',0))" 2>/dev/null || echo "?")
          MOVS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('totalMovimentacoes',0))" 2>/dev/null || echo "?")

          echo ""
          echo "Resultado: $SYNCED atualizados | $SKIPPED sem mudança | $FAILED erros | $MOVS novas movimentações"
