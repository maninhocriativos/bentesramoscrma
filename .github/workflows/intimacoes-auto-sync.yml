name: Sync Automático de Intimações

on:
  schedule:
    # A cada 3h das 06:00 às 21:00 horário de Manaus (UTC-4)
    # 06:00 Manaus = 10:00 UTC
    - cron: '0 10 * * 1-5'
    # 09:00 Manaus = 13:00 UTC
    - cron: '0 13 * * 1-5'
    # 12:00 Manaus = 16:00 UTC
    - cron: '0 16 * * 1-5'
    # 15:00 Manaus = 19:00 UTC
    - cron: '0 19 * * 1-5'
    # 18:00 Manaus = 22:00 UTC
    - cron: '0 22 * * 1-5'
    # Sábado: 09:00 e 15:00 Manaus
    - cron: '0 13 * * 6'
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  sync:
    name: Sincronizar Intimações (Escavador / Diários Oficiais)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Disparar intimacoes-scheduler
        run: |
          echo "Disparando sync de intimações..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 30 \
            -X GET \
            "https://qgenaltkjtlvwfgykpxq.supabase.co/functions/v1/intimacoes-scheduler" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnZW5hbHRranRsdndmZ3lrcHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5NjYxOTMsImV4cCI6MjA4MDU0MjE5M30.ewhDXc8qxAXdAevO-LMU_HOzu7oGUbj-p6Tj39hyUgg" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "ERRO: resposta HTTP $HTTP_CODE"
            exit 1
          fi

          QUEUED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('queued',0))" 2>/dev/null || echo "?")
          DEDUP=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('deduplicated',0))" 2>/dev/null || echo "?")

          echo ""
          echo "Resultado: $QUEUED job(s) enfileirado(s) | $DEDUP já em andamento"
